<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-4555364222256220">
  <title>GOLDBERG NODON | Modern Physics Playground</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app">
    <header class="main-header">
      <div class="logo">GOLDBERG NODON</div>
      <nav class="main-nav">
        <a href="#app" class="nav-link active">BUILDER</a>
        <a href="#partnership-section" class="nav-link">PARTNERSHIP</a>
        <a href="#comment-section" class="nav-link">COMMUNITY</a>
        <a href="#physics-section" class="nav-link">PHYSICS</a>
      </nav>
      <div class="header-controls">
        <button id="btn-settings" class="btn btn-icon"><i data-lucide="settings"></i></button>
      </div>
    </header>

    <div class="editor-container" id="editor-view">
      <aside class="sticky-sidebar">
        <button id="sidebar-col-toggle" class="sidebar-toggle-columns">
          <i data-lucide="layout-grid"></i>
        </button>
        <div class="nodon-palette">
          <div class="nodon-item" data-type="ball" draggable="true">
            <div class="nodon-icon ball"><div class="icon-inner"></div></div>
            <span>탱탱공</span>
          </div>
          <div class="nodon-item" data-type="ramp" draggable="true">
            <div class="nodon-icon ramp"><div class="icon-inner"></div></div>
            <span>미끄럼틀</span>
          </div>
          <div class="nodon-item" data-type="box" draggable="true">
            <div class="nodon-icon box"><div class="icon-inner"></div></div>
            <span>상자</span>
          </div>
          <div class="nodon-item" data-type="floor" draggable="true">
            <div class="nodon-icon floor"><div class="icon-inner"></div></div>
            <span>바닥</span>
          </div>
          <div class="nodon-item" data-type="sensor" draggable="true">
            <div class="nodon-icon sensor"><div class="icon-inner"></div></div>
            <span>센서</span>
          </div>
          <div class="nodon-item" data-type="accelerator" draggable="true">
            <div class="nodon-icon accelerator"><div class="icon-inner"></div></div>
            <span>부스터</span>
          </div>
          <div class="nodon-item" data-type="timer" draggable="true">
            <div class="nodon-icon timer"><div class="icon-inner"></div></div>
            <span>타이머</span>
          </div>
        </div>
      </aside>

      <div id="canvas-container">
        <div id="physics-canvas"></div>
        <svg id="wiring-layer"></svg>
        
        <div class="editor-toolbar">
          <button id="btn-play" class="btn btn-primary">
            <i data-lucide="play"></i>
            <span>RUN</span>
          </button>
          <button id="btn-reset" class="btn">
            <i data-lucide="rotate-ccw"></i>
            <span>RESET</span>
          </button>
          <button id="btn-clear" class="btn">
            <i data-lucide="trash-2"></i>
            <span>CLEAR</span>
          </button>
        </div>

        <div id="settings-panel" class="hidden">
          <div class="panel-header">
            <span id="node-name">OBJECT</span>
            <button id="node-delete" class="btn-icon"><i data-lucide="trash"></i></button>
          </div>
          <div class="panel-body">
            <div class="prop-group">
              <label>ELASTICITY</label>
              <input type="range" min="0" max="1" step="0.1" id="input-restitution">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Additional Content Sections -->
    <section id="partnership-section" class="content-section">
      <div class="section-container">
        <h2 class="section-title">PARTNERSHIP</h2>
        <div class="policy-content">
          <form action="https://formspree.io/f/mlgzqpal" method="POST" style="display: flex; flex-direction: column; gap: 1rem; max-width: 600px; margin: 0 auto;">
            <input type="email" name="email" placeholder="YOUR EMAIL" style="padding: 1rem; border-radius: 12px; border: 1px solid #ddd;">
            <textarea name="message" placeholder="YOUR MESSAGE" style="padding: 1rem; border-radius: 12px; border: 1px solid #ddd; min-height: 150px;"></textarea>
            <button type="submit" class="btn btn-primary">SEND INQUIRY</button>
          </form>
        </div>
      </div>
    </section>

    <section id="comment-section" class="content-section">
      <div class="section-container">
        <h2 class="section-title">COMMUNITY</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://goldberg.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
      </div>
    </section>

    <section id="physics-section" class="content-section">
      <div class="section-container">
        <h2 class="section-title">PHYSICS LAWS</h2>
        <div class="policy-content">
          <p>Explore the fundamental laws of motion through our interactive playground.</p>
        </div>
      </div>
    </section>

    <footer class="main-footer">
      <p>&copy; 2026 GOLDBERG NODON. All rights reserved.</p>
      <div class="footer-links">
        <a href="#privacy">PRIVACY</a>
        <a href="#terms">TERMS</a>
      </div>
    </footer>
  </div>
  <script src="main.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
