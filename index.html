<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>골드버그 장치 빌더 (Nodon Style)</title>
  <link rel="stylesheet" href="style.css">
  <!-- Matter.js for Physics -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- Lucide for Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="theme-nintendo">
  <div id="app">
    <header>
      <div class="logo">
        <i data-lucide="box"></i>
        <span data-lang="app_title">골드버그 노돈</span>
      </div>
      <div class="controls">
        <button id="btn-play" class="btn btn-primary">
          <i data-lucide="play"></i> <span data-lang="btn_play">시작</span>
        </button>
        <button id="btn-reset" class="btn btn-secondary">
          <i data-lucide="rotate-ccw"></i> <span data-lang="btn_reset">초기화</span>
        </button>
        <button id="btn-clear" class="btn btn-danger">
          <i data-lucide="trash-2"></i> <span data-lang="btn_clear">모두 삭제</span>
        </button>
        <button id="btn-settings" class="btn">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </header>

    <main>
      <aside id="sidebar">
        <div class="sidebar-section">
          <h3 data-lang="cat_phys">물리 노돈</h3>
          <div class="nodon-palette">
            <div class="nodon-item" data-type="ball" draggable="true">
              <div class="nodon-icon ball"></div>
              <span data-lang="nodon_ball">공</span>
            </div>
            <div class="nodon-item" data-type="ramp" draggable="true">
              <div class="nodon-icon ramp"></div>
              <span data-lang="nodon_ramp">경사로</span>
            </div>
            <div class="nodon-item" data-type="box" draggable="true">
              <div class="nodon-icon box"></div>
              <span data-lang="nodon_box">상자</span>
            </div>
            <div class="nodon-item" data-type="floor" draggable="true">
              <div class="nodon-icon floor"></div>
              <span data-lang="nodon_floor">바닥</span>
            </div>
            <div class="nodon-item" data-type="goal" draggable="true">
              <div class="nodon-icon goal"></div>
              <span data-lang="nodon_goal">골인</span>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <h3 data-lang="cat_logic">논리 노돈</h3>
          <div class="nodon-palette">
            <div class="nodon-item" data-type="sensor" draggable="true">
              <div class="nodon-icon sensor"></div>
              <span data-lang="nodon_sensor">센서</span>
            </div>
            <div class="nodon-item" data-type="fan" draggable="true">
              <div class="nodon-icon fan"></div>
              <span data-lang="nodon_fan">팬</span>
            </div>
            <div class="nodon-item" data-type="timer" draggable="true">
              <div class="nodon-icon timer"></div>
              <span data-lang="nodon_timer">타이머</span>
            </div>
            <div class="nodon-item" data-type="warp-a" draggable="true">
              <div class="nodon-icon warp-a"></div>
              <span data-lang="nodon_warp_a">포탈 A</span>
            </div>
            <div class="nodon-item" data-type="warp-b" draggable="true">
              <div class="nodon-icon warp-b"></div>
              <span data-lang="nodon_warp_b">포탈 B</span>
            </div>
            <div class="nodon-item" data-type="magnet" draggable="true">
              <div class="nodon-icon magnet"></div>
              <span data-lang="nodon_magnet">자석</span>
            </div>
          </div>
        </div>
      </aside>

      <div id="canvas-container">
        <!-- Physics Canvas -->
        <div id="physics-canvas"></div>
        <svg id="wiring-layer"></svg>
        
        <!-- Hover Tooltip -->
        <div id="hover-tooltip" class="hidden">
          <div class="tooltip-title">Nodon Info</div>
          <div class="tooltip-body">Instruction</div>
        </div>
        
        <!-- Global Settings Modal -->
        <div id="settings-modal" class="modal hidden">
          <div class="modal-content">
            <h2 data-lang="settings_title">환경 설정</h2>
            <div class="setting-item">
              <label data-lang="label_language">언어</label>
              <select id="select-lang">
                <option value="ko">한국어</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="setting-item">
              <label data-lang="label_theme">테마</label>
              <select id="select-theme">
                <option value="default">Default</option>
                <option value="dark">Dark</option>
              </select>
            </div>
            <button id="btn-close-settings" class="btn btn-secondary">Close</button>
          </div>
        </div>
        
        <!-- Settings Panel -->
        <div id="settings-panel" class="hidden">
          <div class="panel-header">
            <span id="node-name">Nodon</span>
            <button id="node-delete"><i data-lucide="trash-2"></i></button>
          </div>
          <div class="panel-body">
            <div class="prop-group" id="prop-restitution">
              <label>튕김 정도</label>
              <input type="range" min="0" max="1" step="0.1" id="input-restitution">
            </div>
            <div class="prop-group" id="prop-delay">
              <label>지연 시간 (초)</label>
              <input type="number" min="0" max="10" step="0.5" id="input-delay">
            </div>
            <div class="prop-group" id="prop-power">
              <label>세기</label>
              <input type="range" min="-0.2" max="0.2" step="0.05" id="input-power">
            </div>
          </div>
        </div>
        
        <div id="instructions">
          <p><kbd>드래그</kbd> 배치</p>
          <p><kbd>Shift</kbd> + <kbd>드래그</kbd> 연결 (센서 → 팬)</p>
          <p><kbd>R</kbd> 선택된 노돈 회전</p>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
